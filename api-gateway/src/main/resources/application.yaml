server:
  port: 8888

app:
  allowedOrigins:
    angular-app-url: ${ANGULAR_APP_URL:http://localhost:4200}
spring:
  application:
    name: api-gateway
  cloud :
    config:
      enabled : false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: actia-app
            client-secret: hHRFVqUXh0ABVNPh6x4HotCfXGpf9F8E
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            authorization-uri: http://localhost:8080/realms/fleet-management/protocol/openid-connect/auth
            token-uri: http://localhost:8080/realms/fleet-management/protocol/openid-connect/token
            jwk-set-uri: http://localhost:8080/realms/fleet-management/protocol/openid-connect/certs
            user-info-uri: http://localhost:8080/realms/fleet-management/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

  data:
    redis:
      host: localhost
      port: 6379

  session:
    store-type: redis
    timeout: 3600s   

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ── Logs ──
logging:
  level:
    com.fleetmanagement.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

# ══════════════════════════════
# Profil Docker
# ══════════════════════════════
---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  security:
    oauth2:
      client:
        provider:
          keycloak:
            authorization-uri: http://keycloak:8080/realms/fleet-management/protocol/openid-connect/auth
            token-uri: http://keycloak:8080/realms/fleet-management/protocol/openid-connect/token
            jwk-set-uri: http://keycloak:8080/realms/fleet-management/protocol/openid-connect/certs
            user-info-uri: http://keycloak:8080/realms/fleet-management/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
